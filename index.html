<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ready tool - 제출 전 파일, 이미지 개인정보, CSV 정리 도구</title>
    <meta
      name="description"
      content="Ready tool은 민원, 입사지원, 학교와 기관 제출 전에 파일명, 용량, 이미지 개인정보, CSV와 엑셀 데이터를 브라우저에서 정리하는 공익형 준비 도구입니다."
    />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="canonical" href="https://readytool.com/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ready tool" />
    <meta property="og:title" content="Ready tool - 제출 전 파일 준비 도구" />
    <meta
      property="og:description"
      content="파일 준비 점검, 이미지 개인정보 정리, CSV와 엑셀 데이터 정리를 브라우저에서 처리하는 공익형 도구 모음입니다."
    />
    <meta property="og:url" content="https://readytool.com/" />
    <script id="ready-tool-structured-data" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ready tool",
        "url": "https://readytool.com/",
        "inLanguage": "ko-KR",
        "description": "제출 전 파일, 이미지 개인정보, CSV와 엑셀 데이터를 브라우저에서 정리하는 공익형 준비 도구입니다.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://readytool.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
